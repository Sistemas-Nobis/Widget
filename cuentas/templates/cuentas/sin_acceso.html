<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sin acceso</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
           padding: 18px; background: #f4f6f4; font-family: 'Segoe UI', Roboto, Arial, sans-serif; }
    .card { width: 100%; max-width: 320px; background: #fff; border: 2px solid #0e8c13; border-radius: 16px;
            padding: 28px 22px; text-align: center; box-shadow: 0 12px 34px rgba(0,0,0,.12); }
    .badge { font-size: 40px; line-height: 1; margin-bottom: 12px; }
    h1 { font-size: 17px; color: #0e8c13; margin: 0 0 8px; }
    p { font-size: 13px; color: #666; margin: 0 0 18px; line-height: 1.45; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
           padding: 11px 14px; background: #0e8c13; color: #fff; border: 0; border-radius: 8px;
           font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; transition: background .15s; }
    .btn:hover { background: #0a6b0f; }
    .recurso { font-size: 11px; color: #9aa; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">🔒</div>
    <h1>No tenés acceso a esta pantalla</h1>
    <p>Tu usuario está autenticado pero no pertenece a un grupo con permiso para esta sección.
       Solicitá el acceso a Sistemas.</p>
    {% if alternativa %}
      <a class="btn" href="{{ alternativa.url }}">Ir a {{ alternativa.label }} →</a>
    {% endif %}
    <div class="recurso">Recurso: {{ recurso }}</div>
  </div>
</body>
</html>
